schema_version: 1

context:
  name: pymzml
  version: "2.6.0"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/pymzml-${{ version }}.tar.gz
  sha256: 7ee10b40a12bcaf966bb374618899167bb21ff470ac82d6354a91d9b1a6e7c81

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - numpy >=1.8.0
    - regex

tests:
  - python:
      imports:
        - pymzml
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: high-throughput mzML parsing
  license: MIT
  license_file: LICENSE.txt
  homepage: http://pymzml.github.com

extra:
  recipe-maintainers:
    - hadim
